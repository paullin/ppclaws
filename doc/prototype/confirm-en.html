<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPClaws - Submission Successful</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            astro: {
              dark: '#0d0f14',
              card: '#1e2330',
              border: '#2e364f',
              accent: '#8b5cf6',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-astro-dark text-gray-900 dark:text-gray-100 transition-colors duration-200 min-h-screen flex flex-col">

  <!-- 导航栏简版 -->
  <header class="sticky top-0 z-40 w-full backdrop-blur-md bg-white/80 dark:bg-astro-dark/80 border-b border-gray-200 dark:border-astro-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center flex-shrink-0 cursor-pointer hover:opacity-80 transition-opacity" onclick="window.location.href='./index-en.html'">
          <img src="../../src/assets/logo.webp" alt="Logo" class="h-8 w-8 rounded-md mr-3 object-cover">
          <span class="font-bold text-xl tracking-tight">PPClaws</span>
        </div>
        <button id="theme-toggle" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors" title="切换暗夜模式">
          <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
          <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="flex-1 flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white dark:bg-astro-card border border-gray-200 dark:border-astro-border rounded-2xl p-8 text-center shadow-sm">
      <div class="w-16 h-16 bg-green-100 dark:bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
        <i data-lucide="check" class="w-8 h-8"></i>
      </div>
      <h1 class="text-2xl font-bold tracking-tight mb-3">Submission Successful!</h1>
      <p class="text-gray-500 dark:text-gray-400 mb-8">Thank you for sharing. We have received your submission, and the review team will complete the review within 1-3 business days. If it meets the criteria, your resource will be displayed on the PPClaws website.</p>
      
      <a href="./index-en.html" class="inline-flex items-center justify-center gap-2 w-full py-3 px-4 bg-astro-accent hover:bg-purple-600 text-white font-medium rounded-lg transition-colors">
        Back to Home <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </a>
    </div>
  </main>

  <script>
    lucide.createIcons();

    // Dark Mode Toggle Logic
    const themeToggleBtn = document.getElementById('theme-toggle');
    const htmlElement = document.documentElement;

    // Default to light mode if not set
    if (localStorage.theme === 'dark') {
      htmlElement.classList.add('dark');
    } else {
      htmlElement.classList.remove('dark');
    }

    themeToggleBtn.addEventListener('click', () => {
      if (htmlElement.classList.contains('dark')) {
        htmlElement.classList.remove('dark');
        localStorage.theme = 'light';
      } else {
        htmlElement.classList.add('dark');
        localStorage.theme = 'dark';
      }
    });
  </script>
</body>
</html>
